<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faceless Video System - Complete with Voice Studio</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    background: #0a0a0a;
    color: #e8e8e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  
  h1 {
    font-size: 2rem;
    margin-bottom: 1.5rem;
    color: #e8ff47;
  }
  
  h2 {
    font-size: 1.2rem;
    margin-bottom: 0.75rem;
    color: #e8ff47;
  }
  
  .card {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  
  input, select, textarea {
    width: 100%;
    padding: 0.75rem;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #e8e8e0;
    border-radius: 8px;
    font-size: 0.9rem;
    margin-bottom: 0.75rem;
  }
  
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #e8ff47;
  }
  
  button {
    background: #1e1e1e;
    color: #e8ff47;
    border: 1px solid #e8ff47;
    padding: 0.6rem 1.2rem;
    font-size: 0.9rem;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    margin: 0.25rem;
  }
  
  button:hover {
    background: #e8ff47;
    color: #0a0a0a;
  }
  
  .btn-primary {
    background: #e8ff47;
    color: #0a0a0a;
    font-weight: bold;
  }
  
  .btn-primary:hover {
    background: #ffff00;
    transform: scale(1.02);
  }
  
  .btn-large {
    width: 100%;
    padding: 0.8rem;
    font-size: 1rem;
    margin: 0.5rem 0;
  }
  
  .output-area {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 1rem;
    margin-top: 1rem;
    min-height: 100px;
  }
  
  .topic-item {
    background: #1a1a1a;
    padding: 0.75rem;
    margin: 0.5rem 0;
    border-radius: 8px;
    border-left: 3px solid #e8ff47;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .topic-item:hover {
    background: #252525;
    transform: translateX(5px);
  }
  
  .topic-day {
    font-weight: bold;
    color: #e8ff47;
    font-size: 0.8rem;
  }
  
  .dashboard {
    display: none;
    margin-top: 1rem;
  }
  
  .dashboard.visible {
    display: block;
  }
  
  .column {
    display: inline-block;
    width: 23%;
    vertical-align: top;
    margin: 0.5rem;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 0.5rem;
  }
  
  .dashboard-card {
    background: #222;
    padding: 0.5rem;
    margin: 0.5rem 0;
    border-radius: 8px;
    font-size: 0.8rem;
  }
  
  .stats {
    margin-bottom: 1rem;
    padding: 0.5rem;
    background: #1a1a1a;
    border-radius: 8px;
  }
  
  .stats span {
    margin-right: 1rem;
  }
  
  .loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #e8ff47;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 0.5rem;
  }
  
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  
  /* Modal Styles */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    z-index: 10000;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  
  .modal-container {
    background: #0a0a0a;
    border: 1px solid #333;
    border-radius: 24px;
    padding: 1.5rem;
    width: 90%;
    max-width: 600px;
    max-height: 85vh;
    overflow-y: auto;
  }
  
  .modal-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    border-bottom: 1px solid #333;
    padding-bottom: 0.5rem;
  }
  
  .modal-tab {
    background: none;
    border: none;
    color: #888;
    cursor: pointer;
    padding: 0.5rem 1rem;
  }
  
  .modal-tab.active {
    color: #e8ff47;
    border-bottom: 2px solid #e8ff47;
  }
  
  .voice-status {
    margin: 1rem 0;
    padding: 0.5rem;
    background: #1a1a1a;
    border-radius: 8px;
    text-align: center;
  }
  
  .recording-active {
    color: #ff6b35;
    animation: pulse 1s infinite;
  }
  
  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
  }
  
  audio {
    width: 100%;
    margin: 0.5rem 0;
  }
  
  .copy-btn {
    background: rgba(232,255,71,0.2);
    border-color: #e8ff47;
    padding: 0.2rem 0.5rem;
    font-size: 0.7rem;
    margin-left: 0.5rem;
    cursor: pointer;
  }
  
  .notification {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #e8ff47;
    color: #0a0a0a;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: bold;
    z-index: 20000;
    animation: fadeOut 2s ease forwards;
  }
  
  @keyframes fadeOut {
    0% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
  }
  
  .button-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin: 1rem 0;
  }
  
  .voice-select {
    margin: 1rem 0;
  }
</style>
</head>
<body>

<h1>🎬 Faceless Video System</h1>

<!-- API Key -->
<div class="card">
  <h2>🔑 API Keys</h2>
  <input type="password" id="apiKey" placeholder="OpenAI API Key (sk-...)" style="margin-bottom: 0.5rem;">
  <input type="password" id="elevenLabsKey" placeholder="ElevenLabs API Key (optional - for text-to-speech)">
  <button id="saveKeyBtn" class="btn-primary">Save Keys</button>
  <span id="keyStatus" style="margin-left: 0.5rem;"></span>
</div>

<!-- AI Topic Calendar -->
<div class="card">
  <h2>📅 AI Topic Calendar</h2>
  <input type="text" id="calendarNiche" placeholder="Your niche (e.g., fitness, finance, AI tools)">
  <button id="generateTopicsBtn" class="btn-primary">Generate 7 Topics →</button>
  <div id="calendarOutput" class="output-area" style="display: none;"></div>
</div>

<!-- Script Generator -->
<div class="card">
  <h2>✍️ AI Script Generator</h2>
  <input type="text" id="topic" placeholder="Video topic">
  <select id="styleSelect">
    <option value="educational">Educational / How-to</option>
    <option value="list">List / Top X</option>
    <option value="storytelling">Storytelling</option>
    <option value="motivational">Motivational</option>
  </select>
  <button id="generateBtn" class="btn-primary">Generate Script →</button>
  <button id="viewAssetsBtn">View Asset Library</button>
  <div id="scriptOutput" class="output-area" style="display: none;"></div>
</div>

<!-- Voice Studio -->
<div class="card">
  <h2>🎙️ Voice Studio</h2>
  <button id="openVoiceStudioBtn" class="btn-primary btn-large">OPEN VOICE STUDIO</button>
  <div id="voiceOutput" class="output-area" style="display: none;"></div>
</div>

<!-- Asset Library Output -->
<div id="assetOutput" class="output-area" style="display: none;"></div>

<!-- Action Buttons -->
<div class="button-group">
  <button id="thumbnailBtn" class="btn-primary btn-large">🎨 OPEN THUMBNAIL STUDIO</button>
  <button id="dashboardBtn" class="btn-primary btn-large">📊 OPEN DASHBOARD</button>
  <button id="calendarBtn" class="btn-primary btn-large">📅 OPEN SCHEDULING CALENDAR</button>
  <button id="timerBtn" class="btn-primary btn-large">⏱️ OPEN PRODUCTION TIMER</button>
</div>

<!-- Dashboard Container -->
<div id="dashboardContainer" class="dashboard">
  <div class="stats" id="statsArea"></div>
  <div id="columnsArea"></div>
</div>

<script>
// ============================================
// GLOBAL VARIABLES
// ============================================
let assets = { scripts: [], voiceovers: [] };
let schedules = { items: [] };
let openAIKey = localStorage.getItem('openai_api_key') || '';
let elevenLabsKey = localStorage.getItem('elevenlabs_api_key') || '';

// Production Data
let productionData = {
  sessions: [],
  streak: 0,
  longestStreak: 0,
  lastPostDate: null
};

// Recording variables
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

// ============================================
// HELPER FUNCTIONS
// ============================================
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showNotification(message) {
  const notif = document.createElement('div');
  notif.className = 'notification';
  notif.textContent = message;
  document.body.appendChild(notif);
  setTimeout(() => notif.remove(), 2000);
}

function copyToClipboard(text) {
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    showNotification('✓ Copied to clipboard!');
  }).catch(() => {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    showNotification('✓ Copied to clipboard!');
  });
}

function saveAssets() {
  localStorage.setItem('facelessAssets', JSON.stringify(assets));
}

function loadAssets() {
  const saved = localStorage.getItem('facelessAssets');
  if (saved) assets = JSON.parse(saved);
}

function saveSchedules() {
  localStorage.setItem('facelessSchedules', JSON.stringify(schedules));
}

function loadSchedules() {
  const saved = localStorage.getItem('facelessSchedules');
  if (saved) schedules = JSON.parse(saved);
}

function loadProductionData() {
  const saved = localStorage.getItem('facelessProduction');
  if (saved) productionData = JSON.parse(saved);
}

function saveProductionData() {
  localStorage.setItem('facelessProduction', JSON.stringify(productionData));
}

function recordPublishedVideo() {
  const today = new Date().toISOString().split('T')[0];
  if (productionData.lastPostDate === today) return;
  
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = yesterday.toISOString().split('T')[0];
  
  if (productionData.lastPostDate === yesterdayStr) {
    productionData.streak++;
  } else {
    productionData.streak = 1;
  }
  
  if (productionData.streak > productionData.longestStreak) {
    productionData.longestStreak = productionData.streak;
  }
  
  productionData.lastPostDate = today;
  saveProductionData();
  showNotification(`🔥 ${productionData.streak}-day streak!`);
}

// ============================================
// API KEY
// ============================================
function updateKeyStatus() {
  const status = document.getElementById('keyStatus');
  let msg = '';
  if (openAIKey && openAIKey.startsWith('sk-')) msg += '✓ OpenAI ';
  if (elevenLabsKey && elevenLabsKey.length > 10) msg += '✓ ElevenLabs';
  if (!msg) msg = '⚠️ No keys';
  status.innerHTML = msg;
  status.style.color = msg.includes('✓') ? '#e8ff47' : '#ff6b35';
}

document.getElementById('saveKeyBtn')?.addEventListener('click', () => {
  const openAIInput = document.getElementById('apiKey');
  const elevenInput = document.getElementById('elevenLabsKey');
  let newOpenAI = openAIInput.value.trim();
  let newEleven = elevenInput.value.trim();
  
  if (newOpenAI && newOpenAI.startsWith('sk-')) {
    openAIKey = newOpenAI;
    localStorage.setItem('openai_api_key', newOpenAI);
    openAIInput.value = '••••••••••••••••';
  }
  if (newEleven && newEleven.length > 5) {
    elevenLabsKey = newEleven;
    localStorage.setItem('elevenlabs_api_key', newEleven);
    elevenInput.value = '••••••••••••••••';
  }
  updateKeyStatus();
  showNotification('Keys saved!');
});

// ============================================
// SCRIPT GENERATOR
// ============================================
async function generateScript() {
  const topic = document.getElementById('topic').value.trim();
  const style = document.getElementById('styleSelect').value;
  const output = document.getElementById('scriptOutput');
  
  if (!topic) { alert('Enter a topic'); return; }
  if (!openAIKey) { alert('Enter OpenAI API key first'); return; }
  
  output.innerHTML = '<div class="loading"></div> Generating...';
  output.style.display = 'block';
  
  try {
    const prompts = {
      educational: `Write a 60-second educational script about "${topic}". Start with a hook. End with CTA.`,
      list: `Write a 60-second list-style script about "${topic}". Format as "3 things about...".`,
      storytelling: `Write a 60-second storytelling script about "${topic}".`,
      motivational: `Write a 60-second motivational script about "${topic}".`
    };
    
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${openAIKey}` },
      body: JSON.stringify({
        model: 'gpt-3.5-turbo',
        messages: [{ role: 'user', content: prompts[style] }],
        max_tokens: 300
      })
    });
    
    const data = await res.json();
    const script = data.choices[0].message.content;
    
    output.innerHTML = `
      <strong>🎬 Script:</strong>
      <div style="white-space:pre-line; margin:1rem 0; background:#1a1a1a; padding:1rem; border-radius:8px;">${escapeHtml(script)}</div>
      <button id="saveScriptBtn">💾 Save to Library</button>
      <button id="copyScriptBtn" class="copy-btn">📋 Copy Script</button>
      <button id="useForVoiceBtn" class="copy-btn">🎙️ Use for Voiceover</button>
    `;
    
    document.getElementById('saveScriptBtn')?.addEventListener('click', () => {
      assets.scripts.unshift({
        id: Date.now(),
        topic: topic,
        content: script,
        style: style,
        status: 'draft',
        date: new Date().toLocaleDateString()
      });
      saveAssets();
      showNotification('✓ Script saved!');
      renderDashboard();
    });
    
    document.getElementById('copyScriptBtn')?.addEventListener('click', () => {
      copyToClipboard(script);
    });
    
    document.getElementById('useForVoiceBtn')?.addEventListener('click', () => {
      localStorage.setItem('voiceoverScript', script);
      document.getElementById('openVoiceStudioBtn').click();
      showNotification('✓ Script loaded into Voice Studio!');
    });
    
  } catch (e) {
    output.innerHTML = `<div style="color:#ff6b35;">Error: ${e.message}</div>`;
  }
}

document.getElementById('generateBtn')?.addEventListener('click', generateScript);

// ============================================
// ASSET VIEWER
// ============================================
function viewAssets() {
  const output = document.getElementById('assetOutput');
  if (assets.scripts.length === 0 && assets.voiceovers?.length === 0) {
    output.innerHTML = '<div>No assets saved yet.</div>';
    output.style.display = 'block';
    return;
  }
  
  let html = `<strong>📁 Asset Library</strong><br><br>`;
  if (assets.scripts.length > 0) {
    html += `<strong>📝 Scripts (${assets.scripts.length})</strong>`;
    assets.scripts.forEach(s => {
      html += `<div style="background:#1a1a1a; padding:0.75rem; margin:0.5rem 0; border-radius:8px;">
        <strong>${escapeHtml(s.topic)}</strong><br>
        <span style="color:#888;">${s.style} | ${s.status} | ${s.date}</span>
      </div>`;
    });
  }
  output.innerHTML = html;
  output.style.display = 'block';
}

document.getElementById('viewAssetsBtn')?.addEventListener('click', viewAssets);

// ============================================
// AI TOPIC CALENDAR
// ============================================
async function generateTopics() {
  const niche = document.getElementById('calendarNiche').value.trim();
  const output = document.getElementById('calendarOutput');
  
  if (!niche) { alert('Enter your niche'); return; }
  if (!openAIKey) { alert('Enter OpenAI API key first'); return; }
  
  output.innerHTML = '<div class="loading"></div> Generating topics...';
  output.style.display = 'block';
  
  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${openAIKey}` },
      body: JSON.stringify({
        model: 'gpt-3.5-turbo',
        messages: [{ role: 'user', content: `Generate 7 video topics for a faceless channel about "${niche}". List one per line.` }],
        max_tokens: 200
      })
    });
    
    const data = await res.json();
    let topics = data.choices[0].message.content.split('\n').filter(l => l.trim()).slice(0, 7);
    const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    
    let html = `<strong>📅 Weekly Calendar (${niche})</strong>`;
    topics.forEach((topic, i) => {
      html += `
        <div class="topic-item" onclick="useTopic('${escapeHtml(topic).replace(/'/g, "\\'")}')">
          <div class="topic-day">${days[i]}</div>
          <div>${escapeHtml(topic)}</div>
        </div>
      `;
    });
    output.innerHTML = html;
    
  } catch (e) {
    output.innerHTML = `<div style="color:#ff6b35;">Error: ${e.message}</div>`;
  }
}

document.getElementById('generateTopicsBtn')?.addEventListener('click', generateTopics);

window.useTopic = function(topic) {
  const input = document.getElementById('topic');
  if (input) {
    input.value = topic;
    input.style.border = '2px solid #e8ff47';
    setTimeout(() => input.style.border = '', 1000);
    input.scrollIntoView({ behavior: 'smooth' });
    showNotification(`✓ Topic added: "${topic.substring(0, 50)}..."`);
  }
};

// ============================================
// VOICE STUDIO
// ============================================
function openVoiceStudio() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-container">
      <h2 style="color:#e8ff47; margin-bottom:1rem;">🎙️ Voice Studio</h2>
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="tts">🤖 Text-to-Speech</button>
        <button class="modal-tab" data-tab="record">🎤 Voice Recorder</button>
      </div>
      <div id="voiceModalContent"></div>
      <button id="closeVoiceStudio" style="margin-top:1rem;">Close</button>
    </div>
  `;
  document.body.appendChild(modal);
  
  const tabs = modal.querySelectorAll('.modal-tab');
  tabs.forEach(tab => {
    tab.onclick = () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      loadVoiceTab(tab.dataset.tab, modal);
    };
  });
  
  function loadVoiceTab(tabId, modalEl) {
    const content = modalEl.querySelector('#voiceModalContent');
    if (tabId === 'tts') {
      content.innerHTML = `
        <textarea id="ttsScript" rows="6" placeholder="Enter your script here...">${localStorage.getItem('voiceoverScript') || ''}</textarea>
        <div class="voice-select">
          <select id="ttsVoice">
            <option value="21m00Tcm4TlvDq8ikWAM">Rachel (American)</option>
            <option value="AZnzlk1XvdvUeBnXmlld">Adam (American)</option>
            <option value="EXAVITQu4vc4FCHyG5">Antoni (British)</option>
            <option value="ErXwobaYiN019PkySvjV">Bella (British)</option>
            <option value="MF3mGyEYD7FkB7V7cqQ">Elli (American)</option>
          </select>
        </div>
        <button id="generateTTSBtn" class="btn-primary">Generate Speech →</button>
        <div id="ttsResult" class="output-area" style="display: none;"></div>
      `;
      
      document.getElementById('generateTTSBtn').onclick = async () => {
        const script = document.getElementById('ttsScript').value.trim();
        const voice = document.getElementById('ttsVoice').value;
        const resultDiv = document.getElementById('ttsResult');
        
        if (!script) { alert('Enter a script'); return; }
        if (!elevenLabsKey) { alert('Enter ElevenLabs API key in settings first'); return; }
        
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<div class="loading"></div> Generating speech...';
        
        try {
          const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voice}`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'xi-api-key': elevenLabsKey
            },
            body: JSON.stringify({
              text: script,
              model_id: 'eleven_monolingual_v1',
              voice_settings: { stability: 0.5, similarity_boost: 0.75 }
            })
          });
          
          if (!response.ok) throw new Error('TTS generation failed');
          
          const audioBlob = await response.blob();
          const audioUrl = URL.createObjectURL(audioBlob);
          
          resultDiv.innerHTML = `
            <audio controls src="${audioUrl}"></audio>
            <div style="margin-top:0.5rem;">
              <a href="${audioUrl}" download="voiceover_${Date.now()}.mp3" class="btn-primary" style="display:inline-block; text-decoration:none;">💾 Download MP3</a>
              <button id="saveVoiceAssetBtn" class="copy-btn">📦 Save to Asset Library</button>
            </div>
          `;
          
          let savedAudioBlob = audioBlob;
          document.getElementById('saveVoiceAssetBtn')?.addEventListener('click', () => {
            const reader = new FileReader();
            reader.onloadend = () => {
              assets.voiceovers = assets.voiceovers || [];
              assets.voiceovers.unshift({
                id: Date.now(),
                type: 'tts',
                audioData: reader.result,
                date: new Date().toLocaleDateString()
              });
              saveAssets();
              showNotification('✓ Voiceover saved to library!');
            };
            reader.readAsDataURL(savedAudioBlob);
          });
          
        } catch (e) {
          resultDiv.innerHTML = `<div style="color:#ff6b35;">Error: ${e.message}</div>`;
        }
      };
      
    } else if (tabId === 'record') {
      content.innerHTML = `
        <div class="voice-status" id="recordingStatus">Ready to record</div>
        <button id="startRecordBtn" style="background:#4caf50; color:white;">🔴 Start Recording</button>
        <button id="stopRecordBtn" disabled>⏹️ Stop Recording</button>
        <div id="recordingPreview" class="output-area" style="display: none;"></div>
      `;
      
      let mediaRecorderObj = null;
      let audioChunksArr = [];
      
      document.getElementById('startRecordBtn').onclick = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorderObj = new MediaRecorder(stream);
          audioChunksArr = [];
          
          mediaRecorderObj.ondataavailable = (event) => {
            audioChunksArr.push(event.data);
          };
          
          mediaRecorderObj.onstop = () => {
            const audioBlob = new Blob(audioChunksArr, { type: 'audio/wav' });
            const audioUrl = URL.createObjectURL(audioBlob);
            const preview = document.getElementById('recordingPreview');
            preview.style.display = 'block';
            preview.innerHTML = `
              <audio controls src="${audioUrl}"></audio>
              <div style="margin-top:0.5rem;">
                <a href="${audioUrl}" download="recording_${Date.now()}.wav" class="btn-primary" style="display:inline-block; text-decoration:none;">💾 Download WAV</a>
                <button id="saveRecordingAssetBtn" class="copy-btn">📦 Save to Asset Library</button>
              </div>
            `;
            
            document.getElementById('saveRecordingAssetBtn')?.addEventListener('click', () => {
              const reader = new FileReader();
              reader.onloadend = () => {
                assets.voiceovers = assets.voiceovers || [];
                assets.voiceovers.unshift({
                  id: Date.now(),
                  type: 'recording',
                  audioData: reader.result,
                  date: new Date().toLocaleDateString()
                });
                saveAssets();
                showNotification('✓ Recording saved to library!');
              };
              reader.readAsDataURL(audioBlob);
            });
            
            stream.getTracks().forEach(track => track.stop());
          };
          
          mediaRecorderObj.start();
          isRecording = true;
          document.getElementById('startRecordBtn').disabled = true;
          document.getElementById('stopRecordBtn').disabled = false;
          document.getElementById('recordingStatus').innerHTML = '<span class="recording-active">🔴 RECORDING... Speak now!</span>';
          
        } catch (e) {
          alert('Microphone access denied or not available');
        }
      };
      
      document.getElementById('stopRecordBtn').onclick = () => {
        if (mediaRecorderObj && isRecording) {
          mediaRecorderObj.stop();
          isRecording = false;
          document.getElementById('startRecordBtn').disabled = false;
          document.getElementById('stopRecordBtn').disabled = true;
          document.getElementById('recordingStatus').innerHTML = 'Recording complete! Preview below.';
        }
      };
    }
  }
  
  loadVoiceTab('tts', modal);
  
  modal.querySelector('#closeVoiceStudio').onclick = () => modal.remove();
}

document.getElementById('openVoiceStudioBtn')?.addEventListener('click', openVoiceStudio);

function openProductionTimer() {
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:10000;display:flex;justify-content:center;align-items:center';
  modal.innerHTML = `
    <div style="background:#0a0a0a;border:1px solid #333;border-radius:24px;padding:2rem;width:90%;max-width:500px;text-align:center;">
      <h2 style="color:#e8ff47;margin-bottom:1rem;">⏱️ Production Timer</h2>
      <div style="font-size:3rem;font-family:monospace;margin:1rem 0;" id="timerDisplay">00:00:00</div>
      <div style="margin:1rem 0;">
        <button id="phaseScript" style="background:#e8ff47;color:#000;">✍️ Script</button>
        <button id="phaseVoice">🎙️ Voiceover</button>
        <button id="phaseVideo">🎬 Video</button>
        <button id="phasePublish">📢 Publish</button>
      </div>
      <div>
        <button id="timerStart" style="background:#4caf50;color:white;">▶ Start</button>
        <button id="timerPause">⏸ Pause</button>
        <button id="timerReset">⟳ Reset</button>
        <button id="timerSave" style="background:#e8ff47;color:#000;">💾 Save</button>
      </div>
      <input type="text" id="timerTopic" placeholder="What are you working on?" style="margin:1rem 0;">
      <div style="margin-top:1rem;padding:1rem;background:#111;border-radius:12px;">
        <div style="font-size:2rem;color:#e8ff47;" id="streakNum">${productionData.streak}</div>
        <div>Current Streak 🔥</div>
      </div>
      <button id="closeTimer" style="margin-top:1rem;">Close</button>
    </div>
  `;
  document.body.appendChild(modal);
  
  let seconds = 0;
  let running = false;
  let interval = null;
  let phase = 'script';
  
  const timerDisplay = modal.querySelector('#timerDisplay');
  const updateDisplay = () => {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    timerDisplay.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  };
  
  modal.querySelector('#phaseScript').onclick = () => { phase = 'script'; };
  modal.querySelector('#phaseVoice').onclick = () => { phase = 'voiceover'; };
  modal.querySelector('#phaseVideo').onclick = () => { phase = 'video'; };
  modal.querySelector('#phasePublish').onclick = () => { phase = 'publish'; };
  
  modal.querySelector('#timerStart').onclick = () => {
    if (!running) {
      running = true;
      interval = setInterval(() => { if (running) { seconds++; updateDisplay(); } }, 1000);
    }
  };
  
  modal.querySelector('#timerPause').onclick = () => {
    running = false;
    if (interval) clearInterval(interval);
  };
  
  modal.querySelector('#timerReset').onclick = () => {
    running = false;
    if (interval) clearInterval(interval);
    seconds = 0;
    updateDisplay();
  };
  
  modal.querySelector('#timerSave').onclick = () => {
    if (seconds === 0) { alert('Start the timer first!'); return; }
    const topic = modal.querySelector('#timerTopic').value.trim();
    productionData.sessions.unshift({
      id: Date.now(),
      phase: phase,
      duration: seconds,
      topic: topic,
      date: new Date().toLocaleDateString()
    });
    saveProductionData();
    seconds = 0;
    updateDisplay();
    modal.querySelector('#timerTopic').value = '';
    showNotification('✓ Session saved!');
    modal.querySelector('#streakNum').textContent = productionData.streak;
  };
  
  modal.querySelector('#closeTimer').onclick = () => {
    if (interval) clearInterval(interval);
    modal.remove();
  };
  
  updateDisplay();
}

document.getElementById('timerBtn')?.addEventListener('click', openProductionTimer);

// ============================================
async function genTitles(topic, style) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${openAIKey}` },
    body: JSON.stringify({
      model: 'gpt-3.5-turbo',
      messages: [{ role: 'user', content: `Generate 5 YouTube titles for a "${style}" video about "${topic}". Format: "1. Title (CTR: X%)"` }],
      max_tokens: 300
    })
  });
  const data = await res.json();
  return data.choices[0].message.content;
}

function parseTitles(response) {
  const titles = [];
  response.split('\n').forEach(line => {
    const match = line.match(/^\d+\.\s*(.+?)\s*\(CTR:\s*([\d.]+)%\)/i);
    if (match) titles.push({ title: match[1].trim(), ctr: match[2] });
  });
  return titles;
}

function openThumbnailStudio() {
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:10000;display:flex;justify-content:center;align-items:center';
  modal.innerHTML = `
    <div style="background:#0a0a0a;border:1px solid #333;border-radius:24px;padding:2rem;width:90%;max-width:600px;max-height:80vh;overflow-y:auto;">
      <h2 style="color:#e8ff47;">🎨 Thumbnail & Title Studio</h2>
      <div style="margin:1rem 0;">
        <input type="text" id="titleTopic" placeholder="Video topic" style="width:100%;">
        <select id="titleStyle" style="width:100%; margin-top:0.5rem;">
          <option value="educational">Educational</option>
          <option value="list">List</option>
          <option value="storytelling">Storytelling</option>
          <option value="motivational">Motivational</option>
        </select>
        <button id="genTitlesBtn" style="width:100%; margin-top:0.5rem;">Generate Titles</button>
      </div>
      <div id="titlesResult"></div>
      <button id="closeStudio" style="margin-top:1rem;">Close</button>
    </div>
  `;
  document.body.appendChild(modal);
  
  modal.querySelector('#genTitlesBtn').onclick = async () => {
    const topic = modal.querySelector('#titleTopic').value.trim();
    const style = modal.querySelector('#titleStyle').value;
    const result = modal.querySelector('#titlesResult');
    if (!topic) { alert('Enter a topic'); return; }
    if (!openAIKey) { alert('Enter API key first'); return; }
    result.innerHTML = '<div class="loading"></div> Generating...';
    try {
      const response = await genTitles(topic, style);
      const titles = parseTitles(response);
      let html = '';
      titles.forEach((t, i) => {
        const safeTitle = t.title.replace(/'/g, "\\'");
        html += `
          <div style="background:#1a1a1a;padding:0.75rem;margin:0.5rem 0;border-radius:8px;">
            <strong>${i+1}. ${escapeHtml(t.title)}</strong><br>
            <span style="color:#e8ff47;">CTR: ${t.ctr}%</span>
            <button class="copy-btn" onclick="window.copyToClipboard('${safeTitle}')">Copy</button>
          </div>
        `;
      });
      result.innerHTML = html;
    } catch(e) { result.innerHTML = `<div style="color:#ff6b35;">Error: ${e.message}</div>`; }
  };
  
  modal.querySelector('#closeStudio').onclick = () => modal.remove();
}

document.getElementById('thumbnailBtn')?.addEventListener('click', openThumbnailStudio);

// ============================================
// SCHEDULING CALENDAR
// ============================================
let currentCalendarDate = new Date();

function openSchedulingCalendar() {
  const modal = document.createElement('div');
  modal.className = 'calendar-modal';
  renderCalendarModal(modal);
  document.body.appendChild(modal);
}

function renderCalendarModal(modal) {
  const year = currentCalendarDate.getFullYear();
  const month = currentCalendarDate.getMonth();
  const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date().toISOString().split('T')[0];
  
  let calendarHtml = `
    <div class="calendar-container">
      <div class="calendar-header">
        <h2 style="color:#e8ff47;">📅 Scheduling Calendar</h2>
        <div class="calendar-nav">
          <button id="prevMonth">← Prev</button>
          <span style="margin:0 1rem;">${monthNames[month]} ${year}</span>
          <button id="nextMonth">Next →</button>
          <button id="closeCalendar" style="margin-left:1rem;">Close</button>
        </div>
      </div>
      <div class="calendar-grid">
  `;
  
  const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  weekdays.forEach(day => {
    calendarHtml += `<div class="calendar-day-header">${day}</div>`;
  });
  
  for (let i = 0; i < firstDay; i++) {
    calendarHtml += `<div class="calendar-day empty"></div>`;
  }
  
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const daySchedules = schedules.items.filter(s => s.date === dateStr);
    const isToday = dateStr === today;
    
    calendarHtml += `
      <div class="calendar-day">
        <div class="day-number ${isToday ? 'today' : ''}">${d}</div>
    `;
    
    daySchedules.forEach(s => {
      calendarHtml += `
        <div class="schedule-item" onclick="viewScheduleDetails(${s.id})">
          ${s.platforms.map(p => p === 'youtube' ? '▶️' : p === 'tiktok' ? '🎵' : p === 'instagram' ? '📸' : '👍').join('')} ${escapeHtml(s.topic.substring(0, 20))}
        </div>
      `;
    });
    
    calendarHtml += `
        <button class="add-schedule-btn" onclick="showAddScheduleModal('${dateStr}')">+ Add</button>
      </div>
    `;
  }
  
  calendarHtml += `
      </div>
      <div class="upcoming-list">
        <strong>📋 Upcoming Posts</strong>
        <div id="upcomingList"></div>
      </div>
    </div>
  `;
  
  modal.innerHTML = calendarHtml;
  
  const todayDate = new Date();
  const upcoming = schedules.items.filter(s => new Date(s.date) >= todayDate).sort((a, b) => new Date(a.date) - new Date(b.date)).slice(0, 5);
  const upcomingDiv = modal.querySelector('#upcomingList');
  if (upcomingDiv) {
    if (upcoming.length === 0) {
      upcomingDiv.innerHTML = '<div style="color:#888; padding:0.5rem;">No upcoming posts. Click + Add to schedule!</div>';
    } else {
      upcomingDiv.innerHTML = upcoming.map(s => `
        <div class="upcoming-item">
          <div>
            <strong>${escapeHtml(s.topic.substring(0, 40))}</strong><br>
            <span style="font-size:0.7rem; color:#888;">${s.date}</span>
          </div>
          <div>
            ${s.platforms.map(p => `<span class="platform-badge">${p === 'youtube' ? '▶️ YouTube' : p === 'tiktok' ? '🎵 TikTok' : p === 'instagram' ? '📸 Instagram' : '👍 Facebook'}</span>`).join('')}
            <button onclick="deleteSchedule(${s.id})" style="background:none; border-color:#ff6b35; color:#ff6b35; margin-left:0.5rem;">🗑️</button>
          </div>
        </div>
      `).join('');
    }
  }
  
  modal.querySelector('#prevMonth')?.addEventListener('click', () => {
    currentCalendarDate.setMonth(currentCalendarDate.getMonth() - 1);
    renderCalendarModal(modal);
  });
  
  modal.querySelector('#nextMonth')?.addEventListener('click', () => {
    currentCalendarDate.setMonth(currentCalendarDate.getMonth() + 1);
    renderCalendarModal(modal);
  });
  
  modal.querySelector('#closeCalendar')?.addEventListener('click', () => modal.remove());
}

window.showAddScheduleModal = function(dateStr) {
  const publishedScripts = assets.scripts.filter(s => s.status === 'published');
  if (publishedScripts.length === 0) {
    alert('No published videos. Move a script to "Published" in the dashboard first!');
    return;
  }
  
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:10001;display:flex;justify-content:center;align-items:center';
  modal.innerHTML = `
    <div style="background:#0a0a0a;border:1px solid #333;border-radius:24px;padding:1.5rem;width:90%;max-width:400px;">
      <h3 style="color:#e8ff47;">Schedule for ${dateStr}</h3>
      <select id="scheduleScript" style="width:100%; margin:1rem 0;">
        <option value="">Select a video...</option>
        ${publishedScripts.map(s => `<option value="${s.id}" data-topic="${escapeHtml(s.topic)}">${escapeHtml(s.topic.substring(0, 50))}</option>`).join('')}
      </select>
      <div style="margin:1rem 0;">
        <label><input type="checkbox" value="youtube"> ▶️ YouTube</label><br>
        <label><input type="checkbox" value="tiktok"> 🎵 TikTok</label><br>
        <label><input type="checkbox" value="instagram"> 📸 Instagram</label><br>
        <label><input type="checkbox" value="facebook"> 👍 Facebook</label>
      </div>
      <textarea id="scheduleNotes" placeholder="Notes (optional)" rows="2" style="width:100%;"></textarea>
      <div style="display:flex; gap:0.5rem; margin-top:1rem;">
        <button id="saveSchedule" class="btn-primary">Save</button>
        <button id="cancelSchedule">Cancel</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  
  modal.querySelector('#saveSchedule').onclick = () => {
    const select = modal.querySelector('#scheduleScript');
    const scriptId = parseInt(select.value);
    const selectedOption = select.options[select.selectedIndex];
    const topic = selectedOption?.dataset.topic;
    const platforms = Array.from(modal.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
    const notes = modal.querySelector('#scheduleNotes').value;
    
    if (!scriptId || !topic) { alert('Select a video'); return; }
    if (platforms.length === 0) { alert('Select at least one platform'); return; }
    
    schedules.items.push({
      id: Date.now(),
      scriptId: scriptId,
      topic: topic,
      date: dateStr,
      platforms: platforms,
      notes: notes,
      createdAt: new Date().toISOString()
    });
    saveSchedules();
    modal.remove();
    const calendarModal = document.querySelector('.calendar-modal');
    if (calendarModal) renderCalendarModal(calendarModal);
    showNotification('✓ Scheduled!');
  };
  
  modal.querySelector('#cancelSchedule').onclick = () => modal.remove();
};

window.viewScheduleDetails = function(id) {
  const schedule = schedules.items.find(s => s.id === id);
  if (!schedule) return;
  alert(`📅 ${schedule.topic}\nDate: ${schedule.date}\nPlatforms: ${schedule.platforms.join(', ')}${schedule.notes ? `\nNotes: ${schedule.notes}` : ''}`);
};

window.deleteSchedule = function(id) {
  if (confirm('Delete this scheduled post?')) {
    schedules.items = schedules.items.filter(s => s.id !== id);
    saveSchedules();
    const calendarModal = document.querySelector('.calendar-modal');
    if (calendarModal) renderCalendarModal(calendarModal);
    showNotification('✓ Deleted');
  }
};

document.getElementById('calendarBtn')?.addEventListener('click', openSchedulingCalendar);

function renderDashboard() {
  const columns = [
    { id: 'draft', title: '📝 Draft' },
    { id: 'voice_recorded', title: '🎙️ Voice' },
    { id: 'video_edited', title: '🎬 Edited' },
    { id: 'published', title: '📢 Published' }
  ];
  
  const stats = document.getElementById('statsArea');
  if (stats) {
    stats.innerHTML = `
      <span>📝 Draft: ${assets.scripts.filter(s => s.status === 'draft').length}</span>
      <span>🎙️ Voice: ${assets.scripts.filter(s => s.status === 'voice_recorded').length}</span>
      <span>🎬 Edited: ${assets.scripts.filter(s => s.status === 'video_edited').length}</span>
      <span>📢 Published: ${assets.scripts.filter(s => s.status === 'published').length}</span>
      <span>📊 Total: ${assets.scripts.length}</span>
    `;
  }
  
  const columnsDiv = document.getElementById('columnsArea');
  if (!columnsDiv) return;
  columnsDiv.innerHTML = '';
  
  columns.forEach(col => {
    const scripts = assets.scripts.filter(s => s.status === col.id);
    const columnHtml = `
      <div class="column">
        <strong>${col.title}</strong> (${scripts.length})
        <div id="col-${col.id}"></div>
      </div>
    `;
    columnsDiv.insertAdjacentHTML('beforeend', columnHtml);
    
    const container = document.getElementById(`col-${col.id}`);
    scripts.forEach(script => {
      const card = document.createElement('div');
      card.className = 'dashboard-card';
      card.innerHTML = `
        <strong>${escapeHtml(script.topic)}</strong><br>
        <span style="color:#888;">${script.style}</span>
        <div style="margin-top:0.25rem;">
          <button onclick="viewScript(${script.id})">View</button>
          ${col.id !== 'published' ? `<button onclick="moveScript(${script.id}, '${col.id}')">Move →</button>` : ''}
          <button onclick="deleteScript(${script.id})">Delete</button>
        </div>
      `;
      container.appendChild(card);
    });
  });
}

window.viewScript = function(id) {
  const script = assets.scripts.find(s => s.id === id);
  if (script) alert(`📝 ${script.topic}\n\n${script.content.substring(0, 500)}...`);
};

window.moveScript = function(id, current) {
  const order = ['draft', 'voice_recorded', 'video_edited', 'published'];
  const idx = order.indexOf(current);
  const next = order[idx + 1];
  if (next) {
    const script = assets.scripts.find(s => s.id === id);
    if (script) {
      script.status = next;
      saveAssets();
      if (next === 'published') recordPublishedVideo();
      renderDashboard();
    }
  }
};

window.deleteScript = function(id) {
  if (confirm('Delete this script?')) {
    assets.scripts = assets.scripts.filter(s => s.id !== id);
    saveAssets();
    renderDashboard();
  }
};

let dashboardVisible = false;
document.getElementById('dashboardBtn')?.addEventListener('click', () => {
  const container = document.getElementById('dashboardContainer');
  if (dashboardVisible) {
    container.classList.remove('visible');
    dashboardVisible = false;
  } else {
    renderDashboard();
    container.classList.add('visible');
    dashboardVisible = true;
  }
});
